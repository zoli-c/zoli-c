<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <title>zoli csernatony</title>
        <style>
            body {
                font-family: "Courier New", Courier, monospace;
                background-color: #fefefe;
                color: #222;
                font-size: min(18px, 5vw);
                margin: 0;
                padding: 20px;
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                box-sizing: border-box;
            }
            .container {
                background-color: #97fcff;
                max-width: min(50%, 600px);
                font-weight: bolder;
                border-radius: 4px;
                border: 3px solid #333;
                box-shadow: 10px 10px 0px 0px #000;
                height: auto;
                overflow: visible;
                display: flex;
                flex-direction: column;
                justify-content: center;
                padding: 20px;
            }
            h1 {
                font-size: min(36px, 8vw);
                color: #000;
                margin-bottom: 20px;
                letter-spacing: 2px;
            }
            p {
                line-height: 1.8;
                color: #333;
                margin: 10px 0;
            }
            .email-container {
                margin-top: 40px;
                align-self: center;
                background-color: #333;
                padding: 15px;
                border-radius: 4px;
                border: 3px solid #000;
                box-shadow: 5px 5px 0px 0px #000;
                text-align: center;
                color: #00f7ff;
                text-decoration: none;
                font-weight: bold;
                font-size: min(20px, 4vw);
                width: fit-content;
                cursor: pointer;
                user-select: none; /* Disable text selection by dragging */
            }
            .email-container:hover {
                text-shadow: 0px 0px 1px #00f7ff;
            }
            .dark-link {
                color: #999;
                text-decoration: none;
                border-bottom: 3px solid #999;
            }
            .dark-link:hover {
                border-bottom-color: #666;
            }
            @media (max-width: 600px) {
                body {
                    font-size: 20px;
                }
                .container {
                    max-width: 85%;
                }
                .email-container {
                    font-size: 18px;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Zoli Csernatony</h1>
            <p>
                Designing
                <a class="dark-link" href="https://digin.app">an unusual but better way</a> 
                for creators and their audiences to grow together. Concrete stuff, none of the fluff.
            </p>

            <p>
                <a
                    class="dark-link"
                    href="https://rjionline.org/person/zoli-csernatony-and-dana-amihere/"
                    >RJI Fellow</a
                >
                of the 2024-25 cohort.
            </p>

            <p>
                Any of this sounds interesting? Working on something similar?
                Just want to hang out and chat about stuff?
            </p>

            <a id="email-box" class="email-container">email me</a>
        </div>

        <script>
            document.addEventListener("DOMContentLoaded", function () {
                var user = "zoli";
                var domain = "digin";
                var tld = "app";
                var email = user + "@" + domain + "." + tld;
                var emailLink = document.getElementById("email-box");
                emailLink.textContent = email;
                emailLink.href = "mailto:" + email;
            });
        </script>
    </body>
</html>
