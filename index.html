<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <title>Zoli Csernatony — Building a Better Way for Creators and Audiences</title>
        <meta name="description" content="Zoli Csernatony is building Digin, an unusual but better way for creators and their audiences to grow together. RJI Fellow, 2024-25 cohort." />
        <meta name="author" content="Zoli Csernatony" />
        <meta property="og:title" content="Zoli Csernatony" />
        <meta property="og:description" content="Building an unusual but better way for creators and their audiences to grow together. Concrete stuff, none of the fluff." />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://zoli.fyi" />
        <meta name="twitter:card" content="summary" />
        <meta name="twitter:title" content="Zoli Csernatony" />
        <meta name="twitter:description" content="Building an unusual but better way for creators and their audiences to grow together." />
        <link rel="canonical" href="https://zoli.fyi" />
        <style>
            body {
                font-family: "Courier New", Courier, monospace;
                background-color: #fefefe;
                color: #222;
                font-size: min(18px, 5vw);
                margin: 0;
                padding: 20px;
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                box-sizing: border-box;
            }
            .page {
                display: flex;
                flex-direction: column;
                align-items: center;
                max-width: min(50%, 520px);
            }
            .container {
                background-color: #97fcff;
                width: 100%;
                font-weight: bolder;
                border-radius: 4px;
                border: 3px solid #333;
                box-shadow: 10px 10px 0px 0px #000;
                height: auto;
                overflow: visible;
                display: flex;
                flex-direction: column;
                justify-content: center;
                gap: 8px;
                padding: 30px 30px 15px;
            }
            h1 {
                font-size: min(36px, 8vw);
                padding-bottom: 12px;
                color: #000;
                margin: 0;
                letter-spacing: 2px;
            }
            p {
                line-height: 1.8;
                color: #333;
                margin: 0;
            }
            .actions {
                display: flex;
                flex-direction: column;
                align-items: center;
                margin: 0;
                width: 100%;
            }
            .cta-primary {
                background-color: #333;
                padding: 18px 36px;
                border-radius: 4px;
                border: 3px solid #000;
                box-shadow: 5px 5px 0px 0px #000;
                text-align: center;
                color: #00f7ff;
                text-decoration: none;
                font-family: "Courier New", Courier, monospace;
                font-weight: bold;
                font-size: min(20px, 4vw);
                cursor: pointer;
                user-select: none;
                transition: transform 0.1s, box-shadow 0.1s;
            }
            .cta-primary:hover {
                text-shadow: 0px 0px 1px #00f7ff;
                transform: translate(2px, 2px);
                box-shadow: 3px 3px 0px 0px #000;
            }
            .email-quiet {
                margin-top: 22px;
                color: #777;
                text-decoration: none;
                font-family: "Courier New", Courier, monospace;
                font-weight: bold;
                font-size: min(13px, 3.5vw);
                cursor: pointer;
                text-align: center;
            }
            .email-quiet:hover {
                color: #777;
            }
            .playful {
                display: inline-block;
                transform: rotate(-3deg) translateY(-3px);
                font-style: italic;
                color: #555;
                -webkit-text-stroke: 0px currentColor;
                letter-spacing: 0px;
                margin-left: 0px;
                margin-right: 0px;
                transition: letter-spacing 0.3s ease, margin-left 0.3s ease, margin-right 0.3s ease, color 0.3s ease, -webkit-text-stroke 0.3s ease;
            }
            .dark-link:hover .playful {
                letter-spacing: 1.2px;
                margin-left: -4.2px;
                margin-right: -4.2px;
                color: #846effff;
                -webkit-text-stroke: .8px currentColor;
            }
            .cta-note {
                margin-top: 20px;
                color: #333;
                font-size: min(13px, 3.5vw);
                line-height: 1.8;
            }
            .dark-link {
                color: #555;
                text-decoration: none;
                border-bottom: 3px solid #555;
            }
            .how {
                display: flex;
                flex-direction: column;
                align-items: center;
                margin: 0;
                width: 100%;
                row-gap: 42px;
            }
            @media (max-width: 600px) {
                body {
                    font-size: 20px;
                }
                .page {
                    max-width: 85%;
                }
                .cta-primary {
                    font-size: 18px;
                }
                .cta-note {
                    font-size: 14px;
                }
                .email-quiet {
                    font-size: 12px;
                }
            }
        </style>
    </head>
    <body>
        <div class="page">
            <h1>Zoli Csernatony</h1>

            <div class="container">
                <p>
                    Building
                    <a class="dark-link" href="https://digin.app">an <span class="playful">unusual</span> but better way</a> 
                    for creators and their audiences to grow together.
                    Concrete stuff, no fluff.
                </p>

                <div class="how">
                    <p>Yeah, right.</p>
                    <p>How, though?</p>
                </div>

                <div class="actions">
                    <a class="cta-primary" href="https://calendar.app.google/DtAuzJTwgEfUnTRg8" target="_blank">grab a time*</a>
                    <span class="cta-note">*No commitment, just a 20-minute conversation.</span>
                </div>
            </div>

            <a id="email-box" class="email-quiet"></a>
        </div>

        <script>
            document.addEventListener("DOMContentLoaded", function () {
                var user = "zoli";
                var domain = "digin";
                var tld = "app";
                var email = user + "@" + domain + "." + tld;
                var emailLink = document.getElementById("email-box");
                emailLink.textContent = email;
                emailLink.href = "mailto:" + email;
            });
        </script>
    </body>
</html>
